<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>静读经藏手机版</title>
    <link rel="stylesheet" href="./mobile.css" />
  </head>
  <body>
    <div class="mobile-app">
      <header class="mobile-top">
        <div class="mobile-title">
          <h1>静读经藏</h1>
          <button id="titleSelect" class="title-select" type="button" aria-label="选择经文">
            <span id="headerTitle">心经</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg>
          </button>
        </div>

        <div class="top-actions" aria-label="阅读操作">
          <button id="searchButton" class="icon-button" type="button" aria-label="搜索" title="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" /></svg>
          </button>
          <button id="fontButton" class="icon-button" type="button" aria-label="字号" title="字号">
            <span aria-hidden="true">Aa</span>
          </button>
          <button id="themeButton" class="icon-button" type="button" aria-label="明暗模式" title="明暗模式">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0 8.8 7.8A9 9 0 1 1 12 3Z" /></svg>
          </button>
          <button id="bookmarkButton" class="icon-button" type="button" aria-label="收藏当前段落" title="收藏当前段落">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z" /></svg>
          </button>
        </div>
      </header>

      <main id="mobileView" class="mobile-view" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="手机版导航">
        <button class="nav-item active" type="button" data-tab="read" aria-label="读经">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z" /></svg>
          <span>读经</span>
        </button>
        <button class="nav-item" type="button" data-tab="library" aria-label="经库">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10" /></svg>
          <span>经库</span>
        </button>
        <button class="nav-item" type="button" data-tab="detail" aria-label="详解">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9M12 4h9M4 9h16M4 15h16M4 4h.01M4 20h.01" /></svg>
          <span>详解</span>
        </button>
        <button class="nav-item" type="button" data-tab="mine" aria-label="我的">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM4 21a8 8 0 0 1 16 0" /></svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script src="./sutras.js"></script>
    <script src="./mobile.js"></script>
  </body>
</html>
